<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PAME – Empleados</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['DM Sans', 'sans-serif'] },
          colors: { navy: { 700: '#1e3a8a', 800: '#162d6e' } }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .progress-bar { transition: width 0.5s cubic-bezier(.4,0,.2,1); }
    .emp-row { transition: background 0.12s; cursor: pointer; }
    .emp-row:hover { background: #f1f5f9; }
    .emp-row.selected { background: #eff6ff; border-left: 3px solid #1e3a8a; }
    .emp-row.selected .emp-name { color: #1e3a8a; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">

<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-52 bg-navy-700 flex flex-col flex-shrink-0">
    <div class="flex items-center gap-3 px-5 py-4 border-b border-white/10 h-14">
      <div class="w-7 h-7 rounded-lg bg-white/20 flex items-center justify-center text-white text-xs font-semibold">P</div>
      <span class="text-white text-sm font-semibold tracking-wide">PAME</span>
    </div>
    <nav class="flex-1 px-3 py-3 flex flex-col gap-1">
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/60 hover:bg-white/10 hover:text-white text-sm font-medium transition-colors">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Planes
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-white/[0.17] text-white text-sm font-medium">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Empleados
      </a>
    </nav>
    <div class="px-4 py-4 border-t border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center text-white text-xs font-semibold">AS</div>
        <div>
          <p class="text-white text-xs font-medium">Alain Supervisor</p>
          <p class="text-white/50 text-xs">Supervisor</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Topbar -->
    <header class="bg-navy-700 h-14 flex items-center justify-between px-8 flex-shrink-0">
      <span class="text-white text-sm font-semibold tracking-wide">Plan de Actividades Mensual – PAME</span>
      <button class="flex items-center gap-2 text-white/60 hover:text-white transition-colors">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        <span class="text-xs">Salir</span>
      </button>
    </header>

    <!-- Page header -->
    <div class="px-8 py-4 bg-white border-b border-slate-200 flex items-center justify-between flex-shrink-0">
      <h1 class="text-lg font-semibold text-slate-800">Empleados</h1>
      <div class="flex items-center gap-2">
        <label class="text-sm text-slate-500 whitespace-nowrap">Plan:</label>
        <select id="plan-select" class="text-sm border border-slate-200 bg-white rounded-lg px-3 py-1.5 text-slate-700 focus:outline-none focus:ring-2 focus:ring-navy-700/20 pr-8" onchange="changePlan(this.value)">
          <option value="abril">Mi primer plan de Abril</option>
          <option value="mayo">Plan Mayo 2026</option>
          <option value="junio">Plan Junio 2026</option>
        </select>
      </div>
    </div>

    <!-- Split panel -->
    <div class="flex-1 flex overflow-hidden">

      <!-- Left: Employee list -->
      <div class="w-80 flex-shrink-0 bg-white border-r border-slate-200 flex flex-col overflow-hidden">
        <div class="px-4 py-3 border-b border-slate-100">
          <div class="relative">
            <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" placeholder="Buscar empleado..." class="w-full pl-9 pr-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-navy-700/20 bg-slate-50"/>
          </div>
        </div>
        <div class="overflow-y-auto flex-1" id="employee-list">
          <!-- Rows injected by JS -->
        </div>
      </div>

      <!-- Right: Activity detail -->
      <div class="flex-1 overflow-y-auto bg-slate-50 p-6 flex flex-col gap-5" id="activity-panel">
        <!-- Injected by JS -->
      </div>

    </div>
  </div>
</div>

<script>
const plans = {
  abril: {
    name: 'Mi primer plan de Abril',
    month: 'Abril 2026',
    deadline: '30/4/2026',
    activities: [
      'Recopilar datos de ventas del T1',
      'Análisis de indicadores financieros',
      'Redacción del informe final',
    ]
  },
  mayo: {
    name: 'Plan Mayo 2026',
    month: 'Mayo 2026',
    deadline: '31/5/2026',
    activities: [
      'Revisión presupuestaria Q2',
      'Informe de gestión',
    ]
  },
  junio: {
    name: 'Plan Junio 2026',
    month: 'Junio 2026',
    deadline: '30/6/2026',
    activities: [
      'Evaluación semestral',
      'Actualización de KPIs',
      'Reunión de cierre',
    ]
  }
};

const employees = [
  {
    id: 1,
    name: 'Roberto Trabajador',
    email: 'roberto@uapa.edu.do',
    initials: 'RT',
    color: 'bg-emerald-100 text-emerald-700',
    completions: {
      abril: [0, 1, 2],
      mayo: [0],
      junio: [0, 1],
    }
  },
  {
    id: 2,
    name: 'Ana Martínez',
    email: 'ana@uapa.edu.do',
    initials: 'AM',
    color: 'bg-blue-100 text-blue-700',
    completions: {
      abril: [0, 1],
      mayo: [],
      junio: [0],
    }
  },
  {
    id: 3,
    name: 'Carlos Rodríguez',
    email: 'carlos@uapa.edu.do',
    initials: 'CR',
    color: 'bg-amber-100 text-amber-700',
    completions: {
      abril: [0],
      mayo: [0, 1],
      junio: [],
    }
  },
  {
    id: 4,
    name: 'Sofía Torres',
    email: 'sofia@uapa.edu.do',
    initials: 'ST',
    color: 'bg-slate-100 text-slate-500',
    completions: {
      abril: [],
      mayo: [],
      junio: [],
    }
  },
];

let currentPlan = 'abril';
let selectedId = 1;

function getProgress(emp) {
  const plan = plans[currentPlan];
  const done = (emp.completions[currentPlan] || []).length;
  const total = plan.activities.length;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  return { done, total, pct };
}

function progressColor(pct) {
  if (pct === 100) return 'bg-emerald-500';
  if (pct >= 50) return 'bg-blue-400';
  if (pct > 0) return 'bg-amber-400';
  return 'bg-red-400';
}

function pctColor(pct) {
  if (pct === 100) return 'text-emerald-600';
  if (pct >= 50) return 'text-blue-500';
  if (pct > 0) return 'text-amber-500';
  return 'text-red-500';
}

function renderEmployeeList() {
  const list = document.getElementById('employee-list');
  list.innerHTML = employees.map(emp => {
    const { done, total, pct } = getProgress(emp);
    const isSelected = emp.id === selectedId;
    return `
      <div class="emp-row px-4 py-3.5 border-b border-slate-100 ${isSelected ? 'selected' : ''}"
           onclick="selectEmployee(${emp.id})">
        <div class="flex items-center gap-3 mb-2.5">
          <div class="w-9 h-9 rounded-full ${emp.color} flex items-center justify-center text-xs font-semibold flex-shrink-0">${emp.initials}</div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium emp-name truncate ${isSelected ? 'text-navy-700' : 'text-slate-800'}">${emp.name}</p>
            <p class="text-xs text-slate-400 truncate">${emp.email}</p>
          </div>
          <span class="text-xs font-bold ${pctColor(pct)} flex-shrink-0">${pct}%</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="flex-1 bg-slate-100 rounded-full h-1.5 overflow-hidden">
            <div class="progress-bar h-full ${progressColor(pct)} rounded-full" style="width:${pct}%"></div>
          </div>
          <span class="text-xs text-slate-400 whitespace-nowrap">${done}/${total}</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderActivityPanel() {
  const emp = employees.find(e => e.id === selectedId);
  const plan = plans[currentPlan];
  const completedIndexes = emp.completions[currentPlan] || [];
  const { done, total, pct } = getProgress(emp);

  const completedDates = [
    '17 abr 2026, 10:32',
    '19 abr 2026, 14:15',
    '21 abr 2026, 09:00',
  ];

  const panel = document.getElementById('activity-panel');
  panel.innerHTML = `
    <!-- Employee header -->
    <div class="bg-white border border-slate-200 rounded-xl px-6 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-full ${emp.color} flex items-center justify-center text-sm font-semibold flex-shrink-0">${emp.initials}</div>
        <div>
          <p class="text-base font-semibold text-slate-800">${emp.name}</p>
          <p class="text-xs text-slate-400">${plan.name} · ${plan.month}</p>
        </div>
      </div>
      <div class="flex gap-3">
        <div class="text-center bg-emerald-50 rounded-lg px-4 py-2 min-w-[56px]">
          <p class="text-lg font-semibold text-emerald-600 leading-none">${done}</p>
          <p class="text-xs text-emerald-500 mt-0.5">Completadas</p>
        </div>
        <div class="text-center bg-amber-50 rounded-lg px-4 py-2 min-w-[56px]">
          <p class="text-lg font-semibold text-amber-500 leading-none">${total - done}</p>
          <p class="text-xs text-amber-400 mt-0.5">Faltan</p>
        </div>
        <div class="text-center bg-slate-100 rounded-lg px-4 py-2 min-w-[56px]">
          <p class="text-lg font-semibold ${pctColor(pct)} leading-none">${pct}%</p>
          <p class="text-xs text-slate-400 mt-0.5">Cumplimiento</p>
        </div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="bg-white border border-slate-200 rounded-xl px-6 py-3.5 flex items-center gap-4">
      <span class="text-sm text-slate-500 whitespace-nowrap">Progreso general</span>
      <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
        <div class="progress-bar h-full ${progressColor(pct)} rounded-full" style="width:${pct}%"></div>
      </div>
      <span class="text-sm font-semibold ${pctColor(pct)} whitespace-nowrap">${pct}%</span>
    </div>

    <!-- Activities -->
    <div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Actividades del plan</p>
      <div class="flex flex-col gap-2">
        ${plan.activities.map((act, i) => {
          const isCompleted = completedIndexes.includes(i);
          return `
            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
              <div class="flex items-center gap-4 px-5 py-4 border-l-4 ${isCompleted ? 'border-emerald-400' : 'border-slate-200'}">
                <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 ${isCompleted ? 'bg-emerald-100' : 'bg-slate-100'}">
                  ${isCompleted
                    ? `<svg class="w-3.5 h-3.5 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>`
                    : `<svg class="w-3.5 h-3.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`
                  }
                </div>
                <div class="flex-1">
                  <p class="text-sm font-medium ${isCompleted ? 'text-slate-800' : 'text-slate-500'}">${act}</p>
                  ${isCompleted
                    ? `<p class="text-xs text-slate-400 mt-0.5">Completada el ${completedDates[i] || '—'}</p>`
                    : `<p class="text-xs text-amber-400 mt-0.5">Pendiente</p>`
                  }
                </div>
                ${isCompleted
                  ? `<a href="#" class="text-xs text-blue-600 hover:underline flex items-center gap-1 flex-shrink-0">
                      <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                      Ver evidencia
                    </a>`
                  : `<span class="text-xs bg-amber-50 text-amber-500 px-2.5 py-1 rounded-full flex-shrink-0">Pendiente</span>`
                }
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function selectEmployee(id) {
  selectedId = id;
  renderEmployeeList();
  renderActivityPanel();
}

function changePlan(val) {
  currentPlan = val;
  renderEmployeeList();
  renderActivityPanel();
}

// Init
renderEmployeeList();
renderActivityPanel();
</script>

</body>
</html>
